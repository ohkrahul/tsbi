name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# All Vercel CLI commands run from the repository ROOT. The Vercel project's
# Root Directory is "tsbi", so the CLI resolves the app at <repo-root>/tsbi for
# both build and deploy — consistently, with no path doubling. (cd-ing into
# ./tsbi here previously made `vercel deploy` re-apply the root dir -> tsbi/tsbi.)
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tsbi/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # --archive=tgz uploads the build as ONE tarball instead of thousands of
        # individual files — fixes the flaky "Upload aborted" / EventEmitter leak.
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview — PR)
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
