name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tsbi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tsbi/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Make the pulled production env available to `next build` via .env.local
      # (Next.js auto-loads it). The app's src/lib/db.ts requires DATABASE_URL at
      # build time, so this must be present before `vercel build`.
      - name: Load pulled env for Next build
        run: cp .vercel/.env.production.local .env.local

      # The project's Root Directory is "tsbi" (used by the native git
      # integration). This workflow already runs inside ./tsbi, so clear it in
      # the local pulled project.json to stop `vercel deploy --prebuilt` from
      # doubling the path to ".../tsbi/tsbi". Dashboard setting is untouched.
      - name: Normalize root directory for prebuilt deploy
        run: node -e "const fs=require('fs'),f='.vercel/project.json',j=JSON.parse(fs.readFileSync(f,'utf8'));j.settings=j.settings||{};j.settings.rootDirectory=null;fs.writeFileSync(f,JSON.stringify(j));console.log('cleared rootDirectory for CLI')"

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview — PR)
        if: github.event_name == 'pull_request'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
